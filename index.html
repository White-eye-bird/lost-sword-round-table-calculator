&lt;tr&gt;&lt;td&gt;골드 상점 경험치 북&lt;/td&gt;&lt;td id=&quot;goldShopDaily&quot;&gt;-&lt;/td&gt;&lt;/tr&gt;

&lt;details&gt;
&lt;summary&gt;계산 기준&lt;/summary&gt;
&lt;p class=&quot;note&quot;&gt;미궁은 실제 플레이 관찰을 바탕으로 한 난이도별 주간 평균값을 일일 기준으로 환산합니다. 헬 130,000, 킹 65,000을 적용하며 실제 획득량은 선택과 랜덤 결과에 따라 달라질 수 있습니다. 이벤트는 2주마다 10스테이지 최초 클리어 총 100,000을 반영합니다.&lt;/p&gt;
&lt;p class=&quot;note&quot;&gt;
        원탁 패스 I은 250레벨에서도 사용 가능한 것으로 반영하여 최대 효율 구간을
        &lt;code&gt;236→251&lt;/code&gt;로 계산합니다. 패스 II는 표시 범위 251~300을 현재 레벨 포함으로 적용합니다.
      &lt;/p&gt;

&lt;script&gt;
const roundTableExp = parent.ROUND_TABLE_EXP;
const dungeonExp = {&quot;1&quot;: 490, &quot;2&quot;: 570, &quot;3&quot;: 652, &quot;4&quot;: 738, &quot;5&quot;: 826, &quot;6&quot;: 918, &quot;7&quot;: 1013, &quot;8&quot;: 1111, &quot;9&quot;: 1211, &quot;10&quot;: 1315, &quot;11&quot;: 1422, &quot;12&quot;: 1569, &quot;13&quot;: 1722, &quot;14&quot;: 1880, &quot;15&quot;: 2043, &quot;16&quot;: 2212, &quot;17&quot;: 2386, &quot;18&quot;: 2566, &quot;19&quot;: 2751, &quot;20&quot;: 2941, &quot;21&quot;: 3137, &quot;22&quot;: 3338, &quot;23&quot;: 3545, &quot;24&quot;: 3757, &quot;25&quot;: 3975, &quot;26&quot;: 4197, &quot;27&quot;: 4426, &quot;28&quot;: 4659, &quot;29&quot;: 4898, &quot;30&quot;: 5143, &quot;31&quot;: 5583, &quot;32&quot;: 5974, &quot;33&quot;: 6514, &quot;34&quot;: 7076, &quot;35&quot;: 7809, &quot;36&quot;: 8188, &quot;37&quot;: 8575, &quot;38&quot;: 8971, &quot;39&quot;: 9375, &quot;40&quot;: 9788, &quot;41&quot;: 10209, &quot;42&quot;: 10639, &quot;43&quot;: 11077, &quot;44&quot;: 11523, &quot;45&quot;: 11978, &quot;46&quot;: 12535, &quot;47&quot;: 13104, &quot;48&quot;: 13685, &quot;49&quot;: 14279, &quot;50&quot;: 14884, &quot;51&quot;: 15398, &quot;52&quot;: 15921, &quot;53&quot;: 16451, &quot;54&quot;: 16991, &quot;55&quot;: 17538, &quot;56&quot;: 18094, &quot;57&quot;: 18659, &quot;58&quot;: 19232, &quot;59&quot;: 19813, &quot;60&quot;: 20403, &quot;61&quot;: 20881, &quot;62&quot;: 21365, &quot;63&quot;: 21853, &quot;64&quot;: 22224, &quot;65&quot;: 22597, &quot;66&quot;: 23099, &quot;67&quot;: 23607, &quot;68&quot;: 24120, &quot;69&quot;: 24638, &quot;70&quot;: 25162, &quot;71&quot;: 25691, &quot;72&quot;: 26226, &quot;73&quot;: 26766, &quot;74&quot;: 27312, &quot;75&quot;: 28001};

const passConfig = {
  &quot;1&quot;: { name: &quot;원탁 패스 I&quot;, tickets: 15, min: 200, max: 250, maxStart: 236, maxSaved: 5137974 },
  &quot;2&quot;: { name: &quot;원탁 패스 II&quot;, tickets: 10, min: 251, max: 300, maxStart: 291, maxSaved: 6159575 }
};

const mazeWeekly = {
  hell: 130000,
  king: 65000,
  none: 0
};

const EVENT_TOTAL = 100000;
const EVENT_DAYS = 14;
const GOLD_SHOP_DAILY_EXP = 1000;

const $ = (id) =&gt; document.getElementById(id);
const fmt = (n, maxDigits = 0) =&gt; Number(n).toLocaleString(&quot;ko-KR&quot;, {
  maximumFractionDigits: maxDigits
});

function fillDungeonStages() {
  const select = $(&quot;dungeonStage&quot;);
  for (let stage = 1; stage &lt;= 75; stage++) {
    const option = document.createElement(&quot;option&quot;);
    option.value = stage;
    option.textContent = `${stage}단계`;
    if (stage === 75) option.selected = true;
    select.appendChild(option);
  }
  updateDungeonHint();
}

function updateDungeonHint() {
  const stage = Number($(&quot;dungeonStage&quot;).value);
  const reward = dungeonExp[stage];
  $(&quot;dungeonRewardHint&quot;).textContent =
    `1회 ${fmt(reward)} · 무료 3회 ${fmt(reward * 3)}`;
}

function showError(message) {
  $(&quot;error&quot;).textContent = message;
  $(&quot;error&quot;).style.display = &quot;block&quot;;
  $(&quot;resultPanel&quot;).hidden = true;
}

function checkPassAvailability(showAlert = false) {
  const pass = passConfig[$(&quot;passType&quot;).value];
  const level = Number($(&quot;level&quot;).value);
  const notice = $(&quot;passAvailability&quot;);

  if (!Number.isInteger(level)) {
    notice.textContent = &quot;현재 원탁 레벨을 정수로 입력해 주세요.&quot;;
    notice.className = &quot;hint unavailable&quot;;
    return false;
  }

  const available = level &gt;= pass.min &amp;&amp; level &lt;= pass.max;
  if (available) {
    notice.textContent = `${pass.name} 사용 가능`;
    notice.className = &quot;hint available&quot;;
    return true;
  }

  const message = `${pass.name}은 현재 레벨 ${pass.min}~${pass.max}에서만 사용할 수 있습니다.`;
  notice.textContent = `사용 불가 · ${pass.min}~${pass.max}레벨 전용`;
  notice.className = &quot;hint unavailable&quot;;

  if (showAlert) {
    window.alert(message);
  }
  return false;
}

function calculate() {
  $(&quot;error&quot;).style.display = &quot;none&quot;;

  const pass = passConfig[$(&quot;passType&quot;).value];
  const level = Number($(&quot;level&quot;).value);
  const exploreRaw = $(&quot;explore&quot;).value.trim();
  const explore = Number(exploreRaw);
  const stage = Number($(&quot;dungeonStage&quot;).value);
  const shopTicket = $(&quot;shopTicket&quot;).checked ? 1 : 0;
  const goldShopBooks = $(&quot;goldShopBooks&quot;).checked ? 1 : 0;
  const mazeKey = $(&quot;maze&quot;).value;

  if (!Number.isInteger(level)) {
    showError(&quot;현재 원탁 레벨을 정수로 입력해 주세요.&quot;);
    return;
  }
  if (!checkPassAvailability(true)) {
    showError(`${pass.name}은 현재 레벨 ${pass.min}~${pass.max}에서 사용할 수 있습니다.`);
    return;
  }
  if (exploreRaw === &quot;&quot; || !Number.isFinite(explore) || explore &lt; 0) {
    showError(&quot;무료 탐색 1회 경험치 북 수량을 입력해 주세요.&quot;);
    return;
  }

  const usable = Math.min(pass.tickets, pass.max - level + 1);
  const resultLevel = level + usable;
  const left = pass.tickets - usable;

  let saved = 0;
  for (let current = level; current &lt; resultLevel; current++) {
    const required = roundTableExp[current];
    if (required === undefined) {
      showError(`${current}레벨의 요구 경험치 데이터를 찾지 못했습니다.`);
      return;
    }
    saved += required;
  }

  const dungeonOne = dungeonExp[stage];
  const idleDaily = explore * 13;
  const dungeonDaily = dungeonOne * 3;
  const shopDaily = dungeonOne * shopTicket;
  const mazeDaily = mazeWeekly[mazeKey] / 7;
  const eventDaily = EVENT_TOTAL / EVENT_DAYS;
  const goldShopDaily = GOLD_SHOP_DAILY_EXP * goldShopBooks;
  const daily = idleDaily + dungeonDaily + shopDaily + mazeDaily + eventDaily + goldShopDaily;

  if (daily &lt;= 0) {
    showError(&quot;하루 평균 수급량이 0입니다.&quot;);
    return;
  }

  const days = saved / daily;
  const efficiency = saved / pass.maxSaved * 100;

  let wholeDays = Math.floor(days);
  let remainingHours = Math.round((days - wholeDays) * 24);
  if (remainingHours === 24) {
    wholeDays += 1;
    remainingHours = 0;
  }
  $(&quot;daysSaved&quot;).textContent =
    `${days.toFixed(2)}일 · 약 ${wholeDays}일 ${remainingHours}시간`;
  $(&quot;levelResult&quot;).textContent = `${level} → ${resultLevel}`;
  $(&quot;ticketUse&quot;).textContent = `${usable}장`;
  $(&quot;ticketLeft&quot;).textContent = `${left}장`;
  $(&quot;savedExp&quot;).textContent = fmt(saved);
  $(&quot;dailyTotal&quot;).textContent = fmt(daily, 1);
  $(&quot;efficiency&quot;).textContent = `${efficiency.toFixed(1)}%`;

  $(&quot;idleDaily&quot;).textContent = fmt(idleDaily);
  $(&quot;dungeonDaily&quot;).textContent = fmt(dungeonDaily);
  $(&quot;shopDaily&quot;).textContent = shopTicket ? fmt(shopDaily) : &quot;0&quot;;
  $(&quot;mazeDaily&quot;).textContent = fmt(mazeDaily, 1);
  $(&quot;eventDaily&quot;).textContent = fmt(eventDaily, 1);
  $(&quot;goldShopDaily&quot;).textContent = goldShopBooks ? fmt(goldShopDaily) : &quot;0&quot;;
  $(&quot;dailyTotalTable&quot;).textContent = fmt(daily, 1);

  $(&quot;resultPanel&quot;).hidden = false;
  $(&quot;resultPanel&quot;).scrollIntoView({ behavior: &quot;smooth&quot;, block: &quot;start&quot; });
}

$(&quot;dungeonStage&quot;).addEventListener(&quot;change&quot;, updateDungeonHint);
$(&quot;calculate&quot;).addEventListener(&quot;click&quot;, calculate);
$(&quot;passType&quot;).addEventListener(&quot;change&quot;, () =&gt; {
  const pass = passConfig[$(&quot;passType&quot;).value];
  $(&quot;level&quot;).min = pass.min;
  $(&quot;level&quot;).max = pass.max;
  checkPassAvailability(false);
});
$(&quot;level&quot;).addEventListener(&quot;input&quot;, () =&gt; checkPassAvailability(false));
$(&quot;level&quot;).addEventListener(&quot;change&quot;, () =&gt; checkPassAvailability(true));

fillDungeonStages();
checkPassAvailability(false);
&lt;/script&gt;

&lt;script&gt;
(function(){
  const result = document.getElementById(&quot;resultPanel&quot;);
  const placeholder = document.getElementById(&quot;resultPlaceholder&quot;);

  function syncResultState(){
    if (result &amp;&amp; placeholder) {
      placeholder.hidden = !result.hidden;
    }
    sendHeight();
  }
  function sendHeight(){
    parent.postMessage({
      type:&quot;calculator-height&quot;,
      height:Math.max(document.body.scrollHeight,document.documentElement.scrollHeight)
    },&quot;*&quot;);
  }
  addEventListener(&quot;load&quot;,syncResultState);
  addEventListener(&quot;resize&quot;,sendHeight);
  if(result){
    new MutationObserver(syncResultState).observe(result,{attributes:true,attributeFilter:[&quot;hidden&quot;]});
  }
  new MutationObserver(sendHeight).observe(document.documentElement,{
    childList:true,subtree:true,attributes:true
  });
  setTimeout(syncResultState,100);
  setTimeout(sendHeight,400);
})();
&lt;/script&gt;

&lt;body&gt;
&lt;main&gt;
&lt;h1&gt;보유 경험치 전부 사용 시 도달 레벨&lt;/h1&gt;

&lt;div class=&quot;calc-workspace&quot;&gt;&lt;section class=&quot;panel input-panel&quot; style=&quot;grid-column:1;grid-row:1;&quot;&gt;&lt;h2&gt;입력&lt;/h2&gt;&lt;div class=&quot;panel-body&quot;&gt;&lt;div class=&quot;field-group&quot;&gt;&lt;div class=&quot;field-group-title&quot;&gt;현재 상태&lt;/div&gt;&lt;div class=&quot;field-pair&quot;&gt;&lt;div&gt;

&lt;div class=&quot;field-group&quot;&gt;&lt;div class=&quot;field-group-title&quot;&gt;보유 재화&lt;/div&gt;&lt;div&gt;
&lt;label for=&quot;ownedTickets&quot;&gt;보유 경험치 던전 티켓&lt;/label&gt;
&lt;input id=&quot;ownedTickets&quot; inputmode=&quot;numeric&quot; min=&quot;0&quot; step=&quot;1&quot; type=&quot;number&quot; value=&quot;0&quot;/&gt;
&lt;/div&gt;&lt;div&gt;

&lt;select id=&quot;dungeonStage&quot;&gt;&lt;/select&gt;
&lt;span class=&quot;hint&quot; id=&quot;ticketValueHint&quot;&gt;&lt;/span&gt;
&lt;/div&gt;&lt;div&gt;
&lt;label for=&quot;exploreReward&quot;&gt;무료 보물 탐색 1회 경험치 북&lt;/label&gt;
&lt;input id=&quot;exploreReward&quot; inputmode=&quot;numeric&quot; min=&quot;0&quot; step=&quot;1&quot; type=&quot;number&quot; value=&quot;0&quot;/&gt;

&lt;div class=&quot;headline&quot;&gt;
      최종 도달 가능 레벨
      &lt;strong id=&quot;finalLevel&quot;&gt;-&lt;/strong&gt;

&lt;div class=&quot;card&quot;&gt;&lt;span&gt;상승 레벨&lt;/span&gt;&lt;b id=&quot;levelsGained&quot;&gt;-&lt;/b&gt;&lt;/div&gt;
&lt;div class=&quot;card&quot;&gt;&lt;span&gt;티켓 환산 경험치&lt;/span&gt;&lt;b id=&quot;ticketBooks&quot;&gt;-&lt;/b&gt;&lt;/div&gt;
&lt;div class=&quot;card&quot;&gt;&lt;span&gt;상자 환산 경험치&lt;/span&gt;&lt;b id=&quot;boxBooks&quot;&gt;-&lt;/b&gt;&lt;/div&gt;
&lt;div class=&quot;card&quot;&gt;&lt;span&gt;총 사용 가능 경험치&lt;/span&gt;&lt;b id=&quot;totalBooks&quot;&gt;-&lt;/b&gt;&lt;/div&gt;
&lt;div class=&quot;card&quot;&gt;&lt;span&gt;레벨업에 사용&lt;/span&gt;&lt;b id=&quot;spentBooks&quot;&gt;-&lt;/b&gt;&lt;/div&gt;
&lt;div class=&quot;card&quot;&gt;&lt;span&gt;남는 경험치 북&lt;/span&gt;&lt;b id=&quot;remainingBooks&quot;&gt;-&lt;/b&gt;&lt;/div&gt;
&lt;div class=&quot;card&quot;&gt;&lt;span&gt;다음 레벨까지 부족&lt;/span&gt;&lt;b id=&quot;shortage&quot;&gt;-&lt;/b&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;details open=&quot;&quot;&gt;
&lt;summary&gt;계산 내역&lt;/summary&gt;
&lt;table&gt;
&lt;tbody&gt;
&lt;tr&gt;&lt;td&gt;보유 경험치 북&lt;/td&gt;&lt;td id=&quot;ownedBooksOut&quot;&gt;-&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;티켓 수 × 1장 가치&lt;/td&gt;&lt;td id=&quot;ticketFormula&quot;&gt;-&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;상자 수 × 1시간 탐색 보상&lt;/td&gt;&lt;td id=&quot;boxFormula&quot;&gt;-&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;총 경험치 북&lt;/th&gt;&lt;th id=&quot;totalBooksTable&quot;&gt;-&lt;/th&gt;&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;/details&gt;
&lt;details&gt;
&lt;summary&gt;레벨별 차감 내역&lt;/summary&gt;
&lt;div style=&quot;overflow:auto; max-height:420px;&quot;&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;레벨업&lt;/th&gt;
&lt;th&gt;요구량&lt;/th&gt;
&lt;th&gt;차감 후 잔여&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody id=&quot;breakdownBody&quot;&gt;&lt;/tbody&gt;
&lt;/table&gt;
&lt;/div&gt;
&lt;/details&gt;
&lt;p class=&quot;note&quot;&gt;
      골드는 계산하지 않습니다. 경험치 던전 티켓 1장은 선택한 마지막 클리어 단계의 1회 소탕 보상으로 환산합니다.
      경험치 상자 1개는 무료 보물 탐색 1회 보상(2시간분)의 절반인 1시간분으로 환산합니다.
      요구 경험치 데이터는 원탁 200→301 구간까지만 반영되어 있습니다.
    &lt;/p&gt;
&lt;/div&gt;&lt;/section&gt;&lt;/div&gt;&lt;/main&gt;
&lt;script&gt;
const roundTableExp = parent.ROUND_TABLE_EXP;
const dungeonExp = {&quot;1&quot;: 490, &quot;2&quot;: 570, &quot;3&quot;: 652, &quot;4&quot;: 738, &quot;5&quot;: 826, &quot;6&quot;: 918, &quot;7&quot;: 1013, &quot;8&quot;: 1111, &quot;9&quot;: 1211, &quot;10&quot;: 1315, &quot;11&quot;: 1422, &quot;12&quot;: 1569, &quot;13&quot;: 1722, &quot;14&quot;: 1880, &quot;15&quot;: 2043, &quot;16&quot;: 2212, &quot;17&quot;: 2386, &quot;18&quot;: 2566, &quot;19&quot;: 2751, &quot;20&quot;: 2941, &quot;21&quot;: 3137, &quot;22&quot;: 3338, &quot;23&quot;: 3545, &quot;24&quot;: 3757, &quot;25&quot;: 3975, &quot;26&quot;: 4197, &quot;27&quot;: 4426, &quot;28&quot;: 4659, &quot;29&quot;: 4898, &quot;30&quot;: 5143, &quot;31&quot;: 5583, &quot;32&quot;: 5974, &quot;33&quot;: 6514, &quot;34&quot;: 7076, &quot;35&quot;: 7809, &quot;36&quot;: 8188, &quot;37&quot;: 8575, &quot;38&quot;: 8971, &quot;39&quot;: 9375, &quot;40&quot;: 9788, &quot;41&quot;: 10209, &quot;42&quot;: 10639, &quot;43&quot;: 11077, &quot;44&quot;: 11523, &quot;45&quot;: 11978, &quot;46&quot;: 12535, &quot;47&quot;: 13104, &quot;48&quot;: 13685, &quot;49&quot;: 14279, &quot;50&quot;: 14884, &quot;51&quot;: 15398, &quot;52&quot;: 15921, &quot;53&quot;: 16451, &quot;54&quot;: 16991, &quot;55&quot;: 17538, &quot;56&quot;: 18094, &quot;57&quot;: 18659, &quot;58&quot;: 19232, &quot;59&quot;: 19813, &quot;60&quot;: 20403, &quot;61&quot;: 20881, &quot;62&quot;: 21365, &quot;63&quot;: 21853, &quot;64&quot;: 22224, &quot;65&quot;: 22597, &quot;66&quot;: 23099, &quot;67&quot;: 23607, &quot;68&quot;: 24120, &quot;69&quot;: 24638, &quot;70&quot;: 25162, &quot;71&quot;: 25691, &quot;72&quot;: 26226, &quot;73&quot;: 26766, &quot;74&quot;: 27312, &quot;75&quot;: 28001};

const $ = (id) =&gt; document.getElementById(id);
const fmt = (n) =&gt; Number(n).toLocaleString(&quot;ko-KR&quot;, { maximumFractionDigits: 1 });

function fillStages() {
  const select = $(&quot;dungeonStage&quot;);
  for (let stage = 1; stage &lt;= 75; stage++) {
    const option = document.createElement(&quot;option&quot;);
    option.value = stage;
    option.textContent = `${stage}단계`;
    if (stage === 75) option.selected = true;
    select.appendChild(option);
  }
  updateTicketHint();
}

function updateTicketHint() {
  const stage = Number($(&quot;dungeonStage&quot;).value);
  $(&quot;ticketValueHint&quot;).textContent =
    `티켓 1장 = 경험치 북 ${fmt(dungeonExp[stage])}개`;
}

function fail(message) {
  $(&quot;error&quot;).textContent = message;
  $(&quot;error&quot;).style.display = &quot;block&quot;;
  $(&quot;resultPanel&quot;).hidden = true;
}

function readNonNegativeInteger(id, label) {
  const raw = $(id).value.trim();
  const value = Number(raw);
  if (raw === &quot;&quot; || !Number.isInteger(value) || value &lt; 0) {
    throw new Error(`${label}을 0 이상의 정수로 입력해 주세요.`);
  }
  return value;
}

function calculate() {
  $(&quot;error&quot;).style.display = &quot;none&quot;;

  try {
    const level = readNonNegativeInteger(&quot;currentLevel&quot;, &quot;현재 원탁 레벨&quot;);
    const ownedBooks = readNonNegativeInteger(&quot;ownedBooks&quot;, &quot;보유 경험치 북&quot;);
    const ownedTickets = readNonNegativeInteger(&quot;ownedTickets&quot;, &quot;보유 경험치 던전 티켓&quot;);
    const exploreReward = readNonNegativeInteger(&quot;exploreReward&quot;, &quot;무료 보물 탐색 1회 경험치 북&quot;);
    const ownedBoxes = readNonNegativeInteger(&quot;ownedBoxes&quot;, &quot;보유 경험치 상자&quot;);
    const stage = Number($(&quot;dungeonStage&quot;).value);

    if (level &lt; 200 || level &gt; 300) {
      throw new Error(&quot;현재 원탁 레벨은 200~300 범위에서 입력해 주세요.&quot;);
    }

    const oneTicketValue = dungeonExp[stage];
    const ticketBooks = ownedTickets * oneTicketValue;
    const oneBoxValue = exploreReward / 2;
    const boxBooks = ownedBoxes * oneBoxValue;
    const totalBooks = ownedBooks + ticketBooks + boxBooks;

    let current = level;
    let remaining = totalBooks;
    let spent = 0;
    const breakdown = [];

    while (current &lt;= 300) {
      const required = roundTableExp[current];
      if (required === undefined || remaining &lt; required) break;

      remaining -= required;
      spent += required;
      breakdown.push({
        from: current,
        to: current + 1,
        required,
        remaining
      });
      current += 1;
    }

    let nextRequired = null;
    let shortage = null;
    if (current &lt;= 300 &amp;&amp; roundTableExp[current] !== undefined) {
      nextRequired = roundTableExp[current];
      shortage = Math.max(0, nextRequired - remaining);
    }

    $(&quot;finalLevel&quot;).textContent = `${level} → ${current}`;
    $(&quot;levelsGained&quot;).textContent = `${current - level}레벨`;
    $(&quot;ticketBooks&quot;).textContent = fmt(ticketBooks);
    $(&quot;boxBooks&quot;).textContent = fmt(boxBooks);
    $(&quot;totalBooks&quot;).textContent = fmt(totalBooks);
    $(&quot;spentBooks&quot;).textContent = fmt(spent);
    $(&quot;remainingBooks&quot;).textContent = fmt(remaining);

    if (shortage === null) {
      $(&quot;shortage&quot;).textContent = &quot;301레벨 도달 · 계산 지원 범위 종료&quot;;
    } else {
      $(&quot;shortage&quot;).textContent = `${fmt(shortage)}개`;
    }

    $(&quot;ownedBooksOut&quot;).textContent = fmt(ownedBooks);
    $(&quot;ticketFormula&quot;).textContent =
      `${fmt(ownedTickets)}장 × ${fmt(oneTicketValue)} = ${fmt(ticketBooks)}`;
    $(&quot;boxFormula&quot;).textContent =
      `${fmt(ownedBoxes)}개 × (${fmt(exploreReward)} ÷ 2) = ${fmt(boxBooks)}`;
    $(&quot;totalBooksTable&quot;).textContent = fmt(totalBooks);

    const tbody = $(&quot;breakdownBody&quot;);
    tbody.innerHTML = &quot;&quot;;
    if (breakdown.length === 0) {
      const tr = document.createElement(&quot;tr&quot;);
      tr.innerHTML = `&lt;td colspan=&quot;3&quot; style=&quot;text-align:center;color:var(--muted)&quot;&gt;현재 보유량으로는 레벨업할 수 없습니다.&lt;/td&gt;`;
      tbody.appendChild(tr);
    } else {
      for (const row of breakdown) {
        const tr = document.createElement(&quot;tr&quot;);
        tr.innerHTML =
          `&lt;td&gt;${row.from} → ${row.to}&lt;/td&gt;` +
          `&lt;td&gt;${fmt(row.required)}&lt;/td&gt;` +
          `&lt;td&gt;${fmt(row.remaining)}&lt;/td&gt;`;
        tbody.appendChild(tr);
      }
    }

    $(&quot;resultPanel&quot;).hidden = false;
    $(&quot;resultPanel&quot;).scrollIntoView({ behavior:&quot;smooth&quot;, block:&quot;start&quot; });
  } catch (error) {
    fail(error.message);
  }
}

$(&quot;dungeonStage&quot;).addEventListener(&quot;change&quot;, updateTicketHint);
$(&quot;calculate&quot;).addEventListener(&quot;click&quot;, calculate);
fillStages();
&lt;/script&gt;

&lt;script&gt;
(function(){
  const result = document.getElementById(&quot;resultPanel&quot;);
  const placeholder = document.getElementById(&quot;resultPlaceholder&quot;);

  function syncResultState(){
    if (result &amp;&amp; placeholder) {
      placeholder.hidden = !result.hidden;
    }
    sendHeight();
  }
  function sendHeight(){
    parent.postMessage({
      type:&quot;calculator-height&quot;,
      height:Math.max(document.body.scrollHeight,document.documentElement.scrollHeight)
    },&quot;*&quot;);
  }
  addEventListener(&quot;load&quot;,syncResultState);
  addEventListener(&quot;resize&quot;,sendHeight);
  if(result){
    new MutationObserver(syncResultState).observe(result,{attributes:true,attributeFilter:[&quot;hidden&quot;]});
  }
  new MutationObserver(sendHeight).observe(document.documentElement,{
    childList:true,subtree:true,attributes:true
  });
  setTimeout(syncResultState,100);
  setTimeout(sendHeight,400);
})();
&lt;/script&gt;

</div>
<script>
const tabPass=document.getElementById("tabPass");
const tabLevel=document.getElementById("tabLevel");
const passPanel=document.getElementById("passPanel");
const levelPanel=document.getElementById("levelPanel");
const passFrame=document.getElementById("passFrame");
const levelFrame=document.getElementById("levelFrame");

function activate(type){
  const pass=type==="pass";
  passPanel.hidden=!pass;
  levelPanel.hidden=pass;
  tabPass.setAttribute("aria-selected",String(pass));
  tabLevel.setAttribute("aria-selected",String(!pass));
}
tabPass.addEventListener("click",()=>activate("pass"));
tabLevel.addEventListener("click",()=>activate("level"));
addEventListener("message",(event)=>{
  if(!event.data || event.data.type!=="calculator-height") return;
  const h=Math.max(620,Number(event.data.height)||0);
  if(event.source===passFrame.contentWindow) passFrame.style.height=h+"px";
  if(event.source===levelFrame.contentWindow) levelFrame.style.height=h+"px";
});
</script>
</body>
</html>
